<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CalProgram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f; --surface:#161616; --surface2:#1e1e1e; --border:#2a2a2a;
  --accent:#c8f55a; --teal:#5af5c8; --amber:#f5c85a; --purple:#c85af5; --red:#f55a5a;
  --text:#e8e8e8; --muted:#888; --dim:#555;
  --focus-push:#f55a5a; --focus-pull:#5af5c8; --focus-legs:#c8f55a;
  --focus-full:#c85af5; --focus-rest:#f5c85a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text);
  font-family:'Space Grotesk',system-ui,sans-serif; font-weight:400;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'Space Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{height:0;width:0}

/* ---------- HEADER ---------- */
header{
  position:sticky; top:0; z-index:40; background:rgba(15,15,15,.92);
  backdrop-filter:blur(12px); border-bottom:1px solid var(--border);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
}
.head-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:baseline;gap:8px}
.brand h1{font-size:19px;font-weight:700;letter-spacing:-.5px;margin:0}
.brand h1 span{color:var(--accent)}
.brand .sub{font-size:11px;color:var(--muted);font-weight:400}
.week-badge{
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
  color:var(--accent);border:1px solid rgba(200,245,90,.35);
  background:rgba(200,245,90,.08);padding:5px 10px;border-radius:6px;white-space:nowrap;
}

/* day nav */
.daynav{display:flex;gap:6px;margin-top:12px;overflow-x:auto;padding-bottom:2px}
.daynav button{
  flex:1 0 auto;min-width:42px;padding:8px 4px;border-radius:8px;
  background:var(--surface);border:1px solid var(--border);
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s;
}
.daynav button .dot{width:5px;height:5px;border-radius:50%;background:var(--dim)}
.daynav button.active{color:var(--bg);background:var(--accent);border-color:var(--accent)}
.daynav button.active .dot{background:var(--bg)}
.daynav button.done{border-color:rgba(90,245,200,.4)}
.daynav button.done .dot{background:var(--teal)}
.daynav button.rest{color:var(--amber)}

/* ---------- LAYOUT ---------- */
main{padding:16px 16px 8px;max-width:640px;margin:0 auto}
.hidden{display:none!important}

/* phase banner */
.phase{
  border-left:3px solid var(--accent);background:var(--surface);
  border-radius:8px;padding:11px 13px;margin-bottom:14px;font-size:13px;
  color:var(--text);line-height:1.5;
}
.phase b{color:var(--accent);font-weight:600}
.phase.caution{border-left-color:var(--red)}
.phase.caution b{color:var(--red)}

/* day title */
.day-title{display:flex;align-items:center;gap:10px;margin:2px 0 14px}
.day-title h2{margin:0;font-size:22px;font-weight:700;letter-spacing:-.5px}
.type-pill{
  font-family:'Space Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;
  padding:4px 8px;border-radius:5px;letter-spacing:.5px;
}
.tp-push{background:rgba(245,90,90,.14);color:var(--red)}
.tp-pull{background:rgba(90,245,200,.14);color:var(--teal)}
.tp-legs{background:rgba(200,245,90,.14);color:var(--accent)}
.tp-full{background:rgba(200,90,245,.14);color:var(--purple)}
.tp-rest{background:rgba(245,200,90,.14);color:var(--amber)}
.day-focus{font-size:12px;color:var(--muted);margin:-8px 0 16px}

/* progress bar */
.progress-wrap{margin-bottom:18px}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.progress-top .lbl{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.progress-top .val{font-size:12px;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace}
.bar{height:6px;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:4px;transition:width .35s ease}

/* section header */
.sec-head{
  display:flex;align-items:center;gap:9px;margin:22px 0 11px;
}
.sec-head .num{font-family:'Space Mono',monospace;font-size:11px;color:var(--dim);font-weight:700}
.sec-head h3{margin:0;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text)}
.sec-head .hint{font-size:10px;color:var(--muted);margin-left:auto;font-family:'Space Mono',monospace}

/* exercise card */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  margin-bottom:9px;overflow:hidden;transition:border-color .15s,background .15s;
}
.card.iso{border-left:3px solid var(--teal)}
.card.done{border-color:rgba(200,245,90,.5);background:rgba(200,245,90,.045)}
.card-main{display:flex;align-items:center;gap:12px;padding:13px 14px}
.check{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--border);
  flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:.15s;
}
.card.done .check{background:var(--accent);border-color:var(--accent)}
.check svg{width:13px;height:13px;opacity:0;transition:.15s}
.card.done .check svg{opacity:1}
.ex-body{flex:1;min-width:0}
.ex-name{font-size:14.5px;font-weight:500;line-height:1.3;transition:.15s}
.card.done .ex-name{color:var(--muted);text-decoration:line-through}
.ex-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.ex-sets{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent)}
.card.done .ex-sets{color:var(--muted)}
.ex-joint{font-size:11px;color:var(--teal)}
.badge{
  font-family:'Space Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;letter-spacing:.4px;
}
.b-joint{background:rgba(90,245,200,.14);color:var(--teal)}
.b-skill{background:rgba(200,245,90,.14);color:var(--accent)}
.b-mobility{background:rgba(245,200,90,.14);color:var(--amber)}
.b-strength{background:rgba(245,90,90,.14);color:var(--red)}
.expand-btn{
  width:30px;height:30px;flex:0 0 auto;border-radius:7px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.2s;
}
.expand-btn svg{width:14px;height:14px;transition:transform .25s}
.card.open .expand-btn svg{transform:rotate(180deg)}
.card.open .expand-btn{color:var(--accent)}
.detail{max-height:0;overflow:hidden;transition:max-height .3s ease}
.card.open .detail{max-height:1200px}
.detail-inner{padding:0 14px 14px;border-top:1px solid var(--border);margin-top:2px;padding-top:13px}
.detail-inner svg.illus{width:100%;border-radius:8px;display:block;margin-bottom:12px;background:#111}
.tips{list-style:none;padding:0;margin:0}
.tips li{font-size:12.5px;color:var(--muted);line-height:1.5;padding-left:16px;position:relative;margin-bottom:6px}
.tips li::before{content:'›';position:absolute;left:2px;color:var(--accent);font-weight:700}
.regress{
  margin-top:10px;font-size:12px;color:var(--amber);background:rgba(245,200,90,.07);
  border-radius:7px;padding:8px 11px;line-height:1.45;
}
.regress b{font-weight:700}
/* hold timer */
.timer{display:flex;align-items:center;gap:10px;margin-top:12px;background:var(--surface2);border-radius:8px;padding:9px 11px}
.timer .tval{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--teal);min-width:56px}
.timer button{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:6px 12px;border-radius:6px;background:var(--teal);color:var(--bg)}
.timer button.ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.timer .thint{font-size:10px;color:var(--dim);margin-left:auto;font-family:'Space Mono',monospace}

/* rest activities */
.rest-list{list-style:none;padding:0;margin:0}
.rest-list li{
  display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px;margin-bottom:9px;font-size:14px;
}
.rest-list li .em{font-size:22px}

/* mark complete */
.mark-btn{
  width:100%;margin:20px 0 6px;padding:15px;border-radius:11px;font-size:14px;font-weight:700;
  background:var(--surface2);color:var(--dim);border:1px solid var(--border);transition:.2s;
  letter-spacing:.3px;
}
.mark-btn.ready{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.mark-btn.completed{background:rgba(90,245,200,.12);color:var(--teal);border-color:rgba(90,245,200,.4)}

/* ---------- SKILL TRACKER ---------- */
.skill-block{margin-top:30px;border-top:1px solid var(--border);padding-top:22px}
.skill-block > .sec-head{margin-top:0}
.skill-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.skill-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.skill-name{font-size:14px;font-weight:600}
.skill-stagelbl{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}
.skill-cur{color:var(--accent);font-weight:700}
.stage-pills{display:flex;gap:5px;margin-bottom:13px;flex-wrap:wrap}
.stage-pills > button{
  flex:1 1 auto;min-width:0;height:28px;border-radius:6px;font-family:'Space Mono',monospace;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.15s;
}
.skill-current-name{font-size:13px;color:var(--text);margin-bottom:12px;min-height:17px}
.skill-current-name b{color:var(--accent);font-weight:600}
.skill-ctrl{display:flex;gap:7px}
.skill-ctrl > button{
  height:34px;border-radius:8px;font-family:'Space Mono',monospace;font-weight:700;font-size:13px;
  display:flex;align-items:center;justify-content:center;
}

/* ---------- WEEK OVERVIEW ---------- */
.week-block{margin-top:28px;border-top:1px solid var(--border);padding-top:22px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.week-cell{
  aspect-ratio:1/1.15;border-radius:9px;background:var(--surface);border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:.15s;
}
.week-cell .wd{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:var(--muted)}
.week-cell .we{font-size:17px;line-height:1}
.week-cell.today{border-color:var(--accent);border-width:2px}
.week-cell.done{background:rgba(90,245,200,.09);border-color:rgba(90,245,200,.35)}

/* ---------- NUTRITION ---------- */
.subtabs{display:flex;gap:6px;margin-bottom:18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px}
.subtabs button{
  flex:1;padding:9px 4px;border-radius:7px;font-size:12px;font-weight:600;color:var(--muted);transition:.15s;
}
.subtabs button.active{background:var(--surface2);color:var(--accent)}

/* macro toggle + grid */
.daytype-toggle{display:flex;gap:6px;margin-bottom:16px}
.daytype-toggle button{
  flex:1;padding:11px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted);
  background:var(--surface);border:1px solid var(--border);transition:.15s;
}
.daytype-toggle button.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.macro-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:8px}
.macro{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px}
.macro .ml{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:'Space Mono',monospace}
.macro .mv{font-size:19px;font-weight:700;margin-top:5px;font-family:'Space Mono',monospace}
.macro.cal .mv{color:var(--accent)}
.macro.pro .mv{color:var(--teal)}
.macro.carb .mv{color:var(--amber)}
.macro.fat .mv{color:var(--purple)}
.macro.water .mv{color:var(--teal)}

/* meal timeline */
.meal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:9px;display:flex;gap:13px}
.meal .time{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);flex:0 0 46px;padding-top:1px}
.meal .mbody{flex:1;min-width:0}
.meal .mtitle{font-size:14px;font-weight:500;line-height:1.35}
.meal .mtag{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-left:7px;letter-spacing:.4px;white-space:nowrap}
.tag-supps{background:rgba(200,90,245,.14);color:var(--purple)}
.tag-prewo,.tag-postwo{background:rgba(200,245,90,.14);color:var(--accent)}
.tag-workout{background:rgba(245,90,90,.14);color:var(--red)}
.tag-meal{background:rgba(90,245,200,.14);color:var(--teal)}
.tag-snack{background:rgba(245,200,90,.14);color:var(--amber)}
.opts{margin-top:9px;display:flex;flex-direction:column;gap:6px}
.opt{background:var(--surface2);border-radius:7px;padding:9px 11px;font-size:12.5px;color:var(--muted);line-height:1.45}
.opt b{color:var(--text);font-weight:600}

/* supplement cards */
.supp-group-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--teal);margin:22px 0 11px}
.supp-group-title:first-child{margin-top:4px}
.supp-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:9px}
.supp-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px}
.supp-name{font-size:15px;font-weight:600}
.supp-dose{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap}
.supp-timing{font-size:12px;color:var(--teal);margin-bottom:8px;font-family:'Space Mono',monospace}
.supp-notes{font-size:12.5px;color:var(--muted);line-height:1.5}
.ref-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:9px}
.ref-row{display:flex;gap:14px;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px}
.ref-row:last-child{border-bottom:none}
.ref-row .rt{font-family:'Space Mono',monospace;font-weight:700;color:var(--accent);flex:0 0 90px}
.aiflam{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:10px;padding:14px;margin-bottom:9px}
.aiflam .ai-item{font-size:13px;color:var(--text);line-height:1.6;padding-left:15px;position:relative}
.aiflam .ai-item::before{content:'🌿';position:absolute;left:-2px;font-size:11px}
.aiflam .ai-item span{color:var(--muted)}

/* key foods */
.food-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin:20px 0 11px}
.food-title:first-child{margin-top:4px}
.food{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 13px;margin-bottom:8px}
.food .fn{font-size:14px;font-weight:500}
.food .fd{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4}
.food .ff{font-family:'Space Mono',monospace;font-size:11px;color:var(--teal);margin-top:5px}

/* weekly view */
.wk-day{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px;margin-bottom:9px}
.wk-day .wkd-top{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.wk-day .wkd-name{font-size:14px;font-weight:600}
.wk-day .wkd-focus{font-size:12.5px;color:var(--muted);line-height:1.5}
.wk-day .wkd-focus b{color:var(--teal);font-weight:600}

/* ---------- TODAY CHECKLIST ---------- */
.today-hero{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:20px}
.today-hero .th-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.today-hero .th-count{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;color:var(--accent);line-height:1}
.today-hero .th-count span{font-size:16px;color:var(--muted)}
.today-hero .th-date{font-size:12px;color:var(--muted);text-align:right;line-height:1.4}
.today-hero .th-pct{font-family:'Space Mono',monospace;font-size:12px;color:var(--teal);font-weight:700}
.chk-group-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin:20px 0 10px;font-family:'Space Mono',monospace}
.chk-item{
  display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:13px 14px;margin-bottom:8px;transition:.15s;
}
.chk-item.done{background:rgba(200,245,90,.045);border-color:rgba(200,245,90,.4)}
.chk-item .chk-box{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.chk-item.done .chk-box{background:var(--accent);border-color:var(--accent)}
.chk-item .chk-box svg{width:13px;height:13px;opacity:0;transition:.15s}
.chk-item.done .chk-box svg{opacity:1}
.chk-item .chk-txt{font-size:14px;line-height:1.35;transition:.15s}
.chk-item.done .chk-txt{color:var(--muted);text-decoration:line-through}
.reset-day{width:100%;margin-top:14px;padding:12px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:600}

/* ---------- BOTTOM NAV ---------- */
nav.bottom{
  position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(15,15,15,.94);
  backdrop-filter:blur(14px);border-top:1px solid var(--border);
  display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));
}
nav.bottom button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted);transition:.15s;border-radius:10px;
}
nav.bottom button .ni{font-size:20px;line-height:1}
nav.bottom button .nl{font-size:10px;font-weight:600;letter-spacing:.2px}
nav.bottom button.active{color:var(--accent)}

.footer-note{text-align:center;font-size:11px;color:var(--dim);margin:26px 0 10px;font-family:'Space Mono',monospace}
</style>
</head>
<body>

<header>
  <div class="head-row">
    <div class="brand">
      <h1><span>Cal</span>Program</h1>
      <span class="sub" id="brandSub">Workout</span>
    </div>
    <div class="week-badge" id="weekBadge">WEEK 1</div>
  </div>
  <div class="daynav" id="dayNav"></div>
</header>

<main>
  <div id="viewWorkout"></div>
  <div id="viewNutrition" class="hidden"></div>
  <div id="viewSupps" class="hidden"></div>
  <div id="viewToday" class="hidden"></div>
  <div class="footer-note">Built for Hari · joint-first calisthenics</div>
</main>

<nav class="bottom" id="bottomNav">
  <button data-tab="workout" class="active"><span class="ni">🏋️</span><span class="nl">Workout</span></button>
  <button data-tab="nutrition"><span class="ni">🥗</span><span class="nl">Nutrition</span></button>
  <button data-tab="supps"><span class="ni">💊</span><span class="nl">Supps</span></button>
  <button data-tab="today"><span class="ni">✓</span><span class="nl">Today</span></button>
</nav>

<script>
/* ============================================================
   ICONS
   ============================================================ */
const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="#0f0f0f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const CHEVRON = '<svg viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

/* ============================================================
   ILLUSTRATION LIBRARY (SVG stick-figure PT diagrams)
   Keyed by keyword; falls back to a placeholder.
   ============================================================ */

// keyword → illustration mapping
function illuFor(name){
  const n = name.toLowerCase();
  const map = [
    ['pseudo planche','planche'],['planche','planche'],
    ['pike push','pike'],['handstand','handstand'],['wall handstand','handstand'],
    ['push-up','pushup'],['push up','pushup'],['ring push','pushup'],
    ['pull-up','pullup'],['pull up','pullup'],['scapular pull','pullup'],['flexed arm hang','pullup'],
    ['dead hang','deadhang'],['passive hang','deadhang'],
    ['inverted row','invertedrow'],['band row','invertedrow'],['face pull','invertedrow'],
    ['dip','dip'],
    ['wall sit','wallsit'],['wall push','plank'],
    ['box squat','squat'],['pistol','squat'],['split squat','squat'],['squat','squat'],
    ['glute bridge','glutebridge'],['terminal knee','wallsit'],['adductor','copenhagen'],
    ['copenhagen','copenhagen'],
    ['calf','calf'],['ankle','calf'],
    ['hollow','hollow'],['l-sit','hollow'],['l sit','hollow'],
    ['arch','arch'],['superman','arch'],
    ['plank','plank'],['elbow plank','plank'],['tension hold','plank'],['bear crawl','bearcrawl'],
    ['pigeon','pigeon'],['couch stretch','stretch'],['hamstring','stretch'],['chest stretch','stretch'],
    ['thread','stretch'],['child','stretch'],['lat','stretch'],['wrist','mobility'],['stretch','stretch'],
    ['mobility','mobility'],['cat-cow','mobility'],['cars','mobility'],['circles','mobility'],
    ['band pull','mobility'],['90/90','stretch'],['pancake','stretch'],['straddle','stretch'],
    ['thoracic','mobility'],['foam roller','mobility'],['loaded stretch','mobility'],
    ['crow','crow'],['frog stand','crow'],['skin the cat','deadhang'],['flow','mobility'],
    ['neck','neck'],['nordic','stretch'],['lateral band','mobility'],['towel squeeze','deadhang'],
    ['bridge','glutebridge'],
  ];
  for(const [k,v] of map){ if(n.includes(k)) return ILLUS[v]; }
  return `<svg class="illus" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="200" fill="#111"/><text x="200" y="95" fill="#444" font-size="13" font-family="monospace" text-anchor="middle">${name}</text><text x="200" y="113" fill="#333" font-size="11" font-family="monospace" text-anchor="middle">illustration coming soon</text></svg>`;
}

function sectionKey(sec,i){return sec+'_'+i}

function dayProgress(day){
  const items = collectItems(day);
  const dc = checked['d'+day.id]||{};
  const done = items.filter(it=>dc[it.key]).length;
  return { done, total:items.length };
}
function collectItems(day){
  const out=[];
  (day.isometric||[]).forEach((e,i)=>out.push({key:sectionKey('iso',i),ex:e}));
  if(!day.rest){
    (day.warmup||[]).forEach((e,i)=>out.push({key:sectionKey('wu',i),ex:e}));
    (day.main||[]).forEach((e,i)=>out.push({key:sectionKey('mn',i),ex:e}));
    (day.cooldown||[]).forEach((e,i)=>out.push({key:sectionKey('cd',i),ex:e}));
  }
  return out;
}

function exCard(day,secKey,idx,e,iso){
  const dc = checked['d'+day.id]||{};
  const key = sectionKey(secKey,idx);
  const done = !!dc[key];
  const badgeCls = 'b-'+e.badge;
  const badgeTxt = e.badge==='joint'?'ISO':e.badge;
  const hasTimer = iso && /(\d+)\s*s/i.test(e.sets);
  const firstSec = hasTimer ? (e.sets.match(/(\d+)\s*s/i)[1]) : 30;
  return `
  <div class="card ${iso?'iso':''} ${done?'done':''}" data-day="${day.id}" data-key="${key}">
    <div class="card-main">
      <div class="check" data-action="toggle">${CHECK_SVG}</div>
      <div class="ex-body" data-action="toggle">
        <div class="ex-name">${e.name}</div>
        <div class="ex-meta">
          <span class="ex-sets">${e.sets}</span>
          <span class="badge ${badgeCls}">${badgeTxt}</span>
          ${e.joint?`<span class="ex-joint">${e.joint}</span>`:''}
        </div>
      </div>
      <button class="expand-btn" data-action="expand">${CHEVRON}</button>
    </div>
    <div class="detail">
      <div class="detail-inner">
        ${illuFor(e.name)}
        <ul class="tips">${(e.tips||[]).map(t=>`<li>${t}</li>`).join('')}</ul>
        ${e.regression?`<div class="regress"><b>If too hard:</b> ${e.regression}</div>`:''}
        ${hasTimer?`
        <div class="timer" data-secs="${firstSec}">
          <span class="tval">0:${String(firstSec).padStart(2,'0')}</span>
          <button data-action="timer-start">Start hold</button>
          <button class="ghost" data-action="timer-reset">Reset</button>
          <span class="thint">hold timer</span>
        </div>`:''}
      </div>
    </div>
  </div>`;
}

function sectionBlock(day,num,title,hint,secKey,list,iso){
  if(!list||!list.length) return '';
  return `
  <div class="sec-head"><span class="num">${num}</span><h3>${title}</h3>${hint?`<span class="hint">${hint}</span>`:''}</div>
  ${list.map((e,i)=>exCard(day,secKey,i,e,iso)).join('')}`;
}

function renderWorkout(){
  const day = DAYS[currentDay];
  const prog = dayProgress(day);
  const pct = prog.total?Math.round(prog.done/prog.total*100):0;
  const dayDone = !!completed[day.id];
  const canComplete = prog.total>0 && prog.done/prog.total>=0.5;

  let html = '';
  // phase banner
  if(day.phase){
    let p = day.phase;
    if(day.caution){ p = p.replace(/^(⚠[^.]*\.)/, '<b>$1</b>'); }
    html += `<div class="phase ${day.caution?'caution':''}">${p}</div>`;
  }

  html += `<div class="day-title"><h2>${day.name}</h2><span class="type-pill tp-${day.type}">${day.type}</span></div>`;
  html += `<div class="day-focus">${day.focus}</div>`;

  if(!day.rest){
    html += `<div class="progress-wrap">
      <div class="progress-top"><span class="lbl">Session progress</span><span class="val">${prog.done}/${prog.total}</span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>`;
  }

  // 1 Isometric (all days)
  html += sectionBlock(day,'01',day.rest?'Isometric Joint Work (light)':'Isometric Joint Work','before warm-up','iso',day.isometric,true);

  if(day.rest){
    html += `<div class="sec-head"><span class="num">02</span><h3>Recovery Activities</h3></div>`;
    html += `<ul class="rest-list">${day.restActivities.map(a=>`<li><span class="em">${a.emoji}</span><span>${a.text}</span></li>`).join('')}</ul>`;
  } else {
    html += sectionBlock(day,'02','Warm-Up','','wu',day.warmup,false);
    html += sectionBlock(day,'03','Main Work','','mn',day.main,false);
    html += sectionBlock(day,'04','Cool-Down','','cd',day.cooldown,false);

    html += `<button class="mark-btn ${dayDone?'completed':(canComplete?'ready':'')}" data-action="mark-day" data-day="${day.id}">
      ${dayDone?'✓ Day complete':(canComplete?'Mark day complete':'Complete 50% to finish the day')}
    </button>`;
  }

  // Skill tracker
  html += renderSkillBlock();
  // Week overview
  html += renderWeekBlock();

  document.getElementById('viewWorkout').innerHTML = html;
  renderDayNav();
  document.getElementById('weekBadge').textContent = 'WEEK '+week;
}

function renderWeekBlock(){

  const done = Object.values(state).filter(Boolean).length;
  const pct = Math.round(done/total*100);
  const dateStr = new Date().toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});

  let html = `<div class="today-hero">

      <div><div class="th-count">${done}<span>/${total}</span></div></div>

  let idx=0;

function saveWorkout(){ store.set('cal_checked',checked); store.set('cal_completed',completed); store.set('cal_skills',skills); store.set('cal_week',week); }

function toggleExercise(dayId,key){
  const dk='d'+dayId;
  if(!checked[dk]) checked[dk]={};
  checked[dk][key]=!checked[dk][key];
  saveWorkout(); renderWorkout();
}
function markDay(dayId){
  completed[dayId]=!completed[dayId];
  // week completion: all training days (Mon–Fri = 0..4) done
  const allTraining=[0,1,2,3,4].every(id=>completed[id]);
  if(allTraining){
    week+=1;
    completed={}; checked={};
    alert('Week complete! Starting Week '+week+'. Progress reset for the new week — skills are kept.');
  }
  saveWorkout(); renderWorkout();
}
function skillSet(id,stage){ skills[id]=Math.max(0,Math.min(7,stage)); saveWorkout(); renderWorkout(); }
function skillInc(id){ skillSet(id,skills[id]+1); }
function skillDec(id){ skillSet(id,skills[id]-1); }
function skillReset(id){ skillSet(id,0); }

function toggleChk(i){
  const key=todayKey();
  if(!todayChk[key]) todayChk[key]={};
  todayChk[key][i]=!todayChk[key][i];
  store.set('nutri_today',todayChk); renderToday();
}
function resetChk(){
  const key=todayKey(); todayChk[key]={}; store.set('nutri_today',todayChk); renderToday();
}

/* timers */
const timers = new WeakMap();
function startTimer(el){
  const disp=el.querySelector('.tval');
  const btn=el.querySelector('[data-action="timer-start"]');
  if(timers.get(el)){ clearInterval(timers.get(el)); timers.delete(el); btn.textContent='Start hold'; return; }
  let secs=parseInt(el.dataset.secs,10);
  btn.textContent='Pause';
  const id=setInterval(()=>{
    secs--;
    disp.textContent='0:'+String(Math.max(secs,0)).padStart(2,'0');
    if(secs<=0){ clearInterval(id); timers.delete(el); btn.textContent='Start hold';
      disp.textContent='Done ✓'; try{navigator.vibrate&&navigator.vibrate(200);}catch(e){} }
  },1000);
  timers.set(el,id);
}
function resetTimer(el){
  if(timers.get(el)){ clearInterval(timers.get(el)); timers.delete(el); }
  const secs=parseInt(el.dataset.secs,10);
  el.querySelector('.tval').textContent='0:'+String(secs).padStart(2,'0');
  el.querySelector('[data-action="timer-start"]').textContent='Start hold';
}

/* ============================================================
   TAB SWITCHING
   ============================================================ */
const SUBS={workout:'Workout',nutrition:'Nutrition',supps:'Supplements',today:'Today'};
function switchTab(tab){
  currentTab=tab;
  document.getElementById('viewWorkout').classList.toggle('hidden',tab!=='workout');
  document.getElementById('viewNutrition').classList.toggle('hidden',tab!=='nutrition');
  document.getElementById('viewSupps').classList.toggle('hidden',tab!=='supps');
  document.getElementById('viewToday').classList.toggle('hidden',tab!=='today');
  document.getElementById('dayNav').style.display = tab==='workout'?'flex':'none';
  document.getElementById('brandSub').textContent=SUBS[tab];
  document.querySelectorAll('#bottomNav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  if(tab==='nutrition') renderNutrition();
  if(tab==='supps') renderSupps();
  if(tab==='today') renderToday();
  window.scrollTo({top:0,behavior:'instant'});
}

/* ============================================================
   EVENT DELEGATION
   ============================================================ */
document.getElementById('bottomNav').addEventListener('click',e=>{
  const b=e.target.closest('button[data-tab]'); if(b) switchTab(b.dataset.tab);
});

document.body.addEventListener('click',e=>{
  const nav=e.target.closest('[data-action="nav-day"],[data-action="goto-day"]');
  if(nav){ currentDay=+nav.dataset.day; renderWorkout(); if(nav.dataset.action==='goto-day'){window.scrollTo({top:0,behavior:'smooth'});} return; }

  const card=e.target.closest('.card');
  if(card){
    const act=e.target.closest('[data-action]');
    if(act && act.dataset.action==='expand'){ card.classList.toggle('open'); return; }
    if(act && act.dataset.action==='toggle'){ toggleExercise(+card.dataset.day,card.dataset.key); return; }
    if(act && act.dataset.action==='timer-start'){ startTimer(act.closest('.timer')); return; }
    if(act && act.dataset.action==='timer-reset'){ resetTimer(act.closest('.timer')); return; }
  }

  const a=e.target.closest('[data-action]'); if(!a) return;
  const act=a.dataset.action;
  if(act==='mark-day') markDay(+a.dataset.day);
  else if(act==='skill-inc') skillInc(a.dataset.skill);
  else if(act==='skill-dec') skillDec(a.dataset.skill);
  else if(act==='skill-reset') skillReset(a.dataset.skill);
  else if(act==='skill-set') skillSet(a.dataset.skill,+a.dataset.stage);
  else if(act==='nutri-sub'){ nutriSub=a.dataset.sub; renderNutrition(); }
  else if(act==='daytype'){ dayType=a.dataset.type; store.set('nutri_daytype',dayType); renderNutrition(); }
  else if(act==='chk-toggle') toggleChk(+a.dataset.idx);
  else if(act==='chk-reset') resetChk();
});

/* ============================================================
   INIT
   ============================================================ */
renderWorkout();
switchTab('workout');
</script>
</body>
</html>
